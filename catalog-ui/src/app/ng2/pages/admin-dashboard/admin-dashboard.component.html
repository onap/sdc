<div class="sdc-admin-container">

    <nav class="sdc-admin-top-bar-menu">
        <button class="sdc-admin-top-bar-menu-tab"
                data-tests-id="usermanagmenttab"
                [class.selected]="isSelected('USER_MANAGEMENT')"
                (click)="moveToTab('USER_MANAGEMENT')">{{'USER_MANAGEMENT' | translate}}
        </button>
        <button class="sdc-admin-top-bar-menu-tab"
                data-tests-id="categorymanagmenttab"
                [class.selected]="isSelected('CATEGORY_MANAGEMENT')"
                (click)="moveToTab('CATEGORY_MANAGEMENT')">{{'CATEGORY_MANAGEMENT' | translate}}
        </button>
        <a [href]="monitorUrl" target="_blank" *ngIf="monitorUrl">
            <button class="sdc-admin-top-bar-menu-monitor-btn"
                    data-tests-id="monitor">{{'MONITOR' | translate}}
            </button>
        </a>
    </nav>

    <div class="sdc-admin-body">
        <user-management *ngIf="isSelected('USER_MANAGEMENT')"></user-management>
        <category-management *ngIf="isSelected('CATEGORY_MANAGEMENT')"></category-management>
    </div>

</div>
