<div class="category-management">

    <div *ngIf="isLoading" data-tests-id="loader" class="sdc-loader-global-wrapper sdc-loader-background">
        <div class="tlv-loader-back"></div>
        <div class="tlv-loader large"></div>
    </div>

    <div class="row">

        <div class="col-sm-6">
            <h4>
                <span class="hand"
                      (click)="selectType(SERVICE)"
                      [ngClass]="{'selected': type === SERVICE}"
                      data-tests-id="servicecategoryheader">{{'SERVICE_CATEGORY_HEADER' | translate}}</span>
                <span class="hand"
                      (click)="selectType(RESOURCE)"
                      [ngClass]="{'selected': type === RESOURCE}"
                      data-tests-id="resourcecategoryheader">{{'RESOURCE_CATEGORY_HEADER' | translate}}</span>
            </h4>
            <span (click)="createCategoryModal(null)"
                  data-tests-id="newcategory">{{'ADD_CATEGORY' | translate}}</span>

            <div class="scrollbar-container" style="overflow-y:auto">
                <ul>
                    <li *ngFor="let category of categoriesToShow"
                        [ngClass]="{'selected': selectedCategory === category, 'gray': selectedSubCategory}"
                        (click)="selectCategory(category)"
                        [attr.data-tests-id]="type === SERVICE ? 'servicecategory' : 'resourcecategory'">
                        {{category.name}}
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-sm-6">
            <h4>
                <span data-tests-id="subcategoryheader">{{'SUBCATEGORY_HEADER' | translate}}</span>
            </h4>
            <span *ngIf="type === RESOURCE && selectedCategory"
                  (click)="createCategoryModal(selectedCategory)"
                  data-tests-id="newsubcategory">{{'ADD_SUBCATEGORY' | translate}}</span>

            <div class="scrollbar-container" style="overflow-y:auto">
                <ul>
                    <li *ngFor="let subcategory of selectedCategory?.subcategories"
                        [ngClass]="{'selected': selectedSubCategory === subcategory}"
                        (click)="selectSubCategory(subcategory)"
                        data-tests-id="subcategory">
                        {{subcategory.name}}
                    </li>
                </ul>
            </div>
        </div>

    </div>
</div>
