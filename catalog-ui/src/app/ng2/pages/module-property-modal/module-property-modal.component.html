<div class="module-property-modal">
    <div class="i-sdc-form-item">
        <label class="i-sdc-form-label">Name</label>
        <span class="module-property-readonly" data-tests-id="name">{{ property.name }}</span>
    </div>
    <div class="i-sdc-form-item">
        <label class="i-sdc-form-label">Type</label>
        <span class="module-property-readonly" data-tests-id="type">{{ property.type }}</span>
    </div>
    <div class="default-value-section i-sdc-form-item" [ngClass]="{error: !isValid()}">
        <label class="i-sdc-form-label">Default Value</label>
        <div class="i-sdc-form-item">
            <input class="i-sdc-form-input" *ngIf="!isBooleanValue()"
                   data-tests-id="defaultvalue" type="text" maxlength="100"
                   [disabled]="isValueDisabled()"
                   [(ngModel)]="property.value" (blur)="onValueChange()"/>
            <select class="i-sdc-form-select" *ngIf="isBooleanValue()"
                    data-tests-id="booleantype" [disabled]="isValueDisabled()" [(ngModel)]="property.value">
                <option value="true">true</option>
                <option value="false">false</option>
            </select>
            <div class="input-error" *ngIf="!isValid()">
                <span *ngIf="errors['minValidation']">{{ 'MIN_VALIDATION_ERROR' | translate }}</span>
                <span *ngIf="errors['maxValidation']">{{ 'MAX_VALIDATION_ERROR' | translate }}</span>
                <span *ngIf="errors['minOrMaxValidation']">{{ 'MIN_MAX_VALIDATION' | translate }}</span>
                <span *ngIf="errors['minValidationVfLevel']">{{ 'MIN_VALIDATION_VF_LEVE_ERROR' | translate }}</span>
                <span *ngIf="errors['maxValidationVfLevel']">{{ 'MAX_VALIDATION_VF_LEVE_ERROR' | translate }}</span>
            </div>
        </div>
    </div>
</div>
