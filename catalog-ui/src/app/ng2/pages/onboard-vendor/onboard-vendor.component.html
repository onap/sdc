<div class="sdc-catalog-container">
    <!-- Inline loader: preserves data-tests-id="loader" for Selenium LoaderHelper.waitForLoader().
         The AngularJS <loader> element cannot be used in an Angular template. -->
    <div *ngIf="isLoading" data-tests-id="loader" class="sdc-loader-global-wrapper sdc-loader-background">
        <div class="tlv-loader-back"></div>
        <div class="tlv-loader large"></div>
    </div>
    <div class="w-sdc-main-container">
        <!-- React "onboarding/vendor" punch-out (onboarding wizard) is mounted into this host
             imperatively via PunchOutRegistry.render. The host must NOT be behind *ngIf so it
             exists when ngAfterViewInit fires. -->
        <div class="onboard-vendor-punch-out-host"></div>
    </div>
    <top-nav
        [topLvlSelectedIndex]="2"
        [menuModel]="topNavMenuModel"
        [version]="version"
        [hideSearch]="true">
    </top-nav>
</div>
