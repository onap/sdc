<!-- Inline loader markup mirrors the old AngularJS <loader> directive (tlv-loader +
     data-tests-id="loader") so Selenium's LoaderHelper.waitForLoader() reliably catches it, the
     same way WorkspaceContainerComponent does. The Angular <loader> element is not declared in
     WorkspaceModule, so it cannot be used here. -->
<div *ngIf="isLoading" data-tests-id="loader" class="sdc-loader-global-wrapper sdc-loader-background">
    <div class="tlv-loader-back"></div>
    <div class="tlv-loader large"></div>
</div>
<!-- React "sequence-diagram" punch-out (FlowsListEditor) is mounted into this host imperatively.
     The host must NOT be behind *ngIf so it exists when ngAfterViewInit fires. -->
<div class="flow-editor-punch-out-host workspace-flow-editor"></div>
