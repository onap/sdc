<div class="w-sdc-modal-icons">
    <div class="suggested-icons-container">
        <div class="suggested-icon-wrapper" [ngClass]="{'selected': selectedIcon === iconSrc}"
             *ngFor="let iconSrc of icons">
            <div class="i-sdc-form-item-suggested-icon large hand {{iconSprite}} {{iconSrc}}"
                 [attr.data-tests-id]="iconSrc + ' iconBox'"
                 (click)="changeIcon(iconSrc)"
                 [title]="iconSrc | translate">
            </div>
        </div>
    </div>
</div>
